<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 32 32">
  <!-- MindGraph Notes App-Icon (Petrol-Redesign, „1a Tile"). Festes Petrol #10696b als
       Marken-Asset (nicht theme-reaktiv wie das In-App-SVG). Quelle: docs/design/petrol-handoff/
       MindGraph Logo.dc.html. Raster-Export (icns/png 256/512/1024) via cairosvg + iconutil. -->
  <rect width="32" height="32" rx="8" fill="#10696b"/>
  <g stroke="#ffffff" stroke-width="1.5" stroke-linecap="round">
    <line x1="16" y1="16" x2="16" y2="7.5"/>
    <line x1="16" y1="16" x2="8" y2="23"/>
    <line x1="16" y1="16" x2="24" y2="23"/>
    <line x1="8" y1="23" x2="24" y2="23"/>
  </g>
  <g fill="#ffffff">
    <circle cx="16" cy="16" r="3"/>
    <circle cx="16" cy="7.5" r="2.3"/>
    <circle cx="8" cy="23" r="2.3"/>
    <circle cx="24" cy="23" r="2.3"/>
  </g>
</svg>
